<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - บันทึกรายรับ-รายจ่าย</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Sarabun:wght@500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js" defer></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(148, 163, 184, 0.06);
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .btn-google {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            color: #334155;
            font-weight: 600;
            padding: 0.75rem 1.25rem;
            border-radius: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-3 fs-1">👩‍❤️‍👨</div>
        <h3 class="fw-bold text-dark mb-1">บันทึกรายรับ-รายจ่าย</h3>
        <p class="text-secondary small mb-4">ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบเพื่อจัดการกระเป๋าเงินของเรา</p>

        <!-- 🚀 ปุ่มล็อกอินผ่าน Google อัจฉริยะ -->
        <button onclick="loginWithGoogle()" class="btn-google shadow-2xs">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            เข้าสู่ระบบด้วย Google
        </button>

        <div class="mt-4 text-center">
            <span class="text-muted small" style="font-size: 0.75rem;"><i class="bi bi-lock-fill"></i> ปลอดภัยผ่านระบบตรวจสอบสิทธิ์ของ Supabase Auth</span>
        </div>
    </div>

    <script>
        // ฟังก์ชันสั่งการผ่านปุ่มกดให้เปิดหน้าต่าง Google OAuth
        async function loginWithGoogle() {
            // ดึงค่า URL ปัจจุบันมาใช้ทำเป็น Redirect URL หลังจากยืนยันตัวตนสำเร็จ
            const currentUrl = window.location.origin + window.location.pathname;
            const targetRedirectUrl = currentUrl.replace('login.html', 'index.html');

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: targetRedirectUrl // จบล็อกอินสำเร็จส่งตัวกลับไปหน้า index.html ทันที
                }
            });

            if (error) {
                alert('เกิดข้อผิดพลาดในการล็อกอิน: ' + error.message);
            }
        }
    </script>

</body>
</html>
